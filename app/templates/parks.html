<!doctype html>
<html lang="ru">
<head>
    <title>ВолонтерПарк - Главная</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css" integrity="sha384-zCbKRCUGaJDkqS1kPbPd7TveP5iyJE0EjAuZQTgFLD2ylzuqKfdKlfG/eSrtxUkn" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/index.css">
</head>
<body>
    <div class="parks-page" id="parksPage">
        <nav class="navbar navbar-expand-lg navbar-dark" style="background: #2a6726ce;">
            <div class="container">
                <a class="navbar-brand" href="#" onclick="window.location.href = '/'">🌿 ВолонтерПарк</a>
                <div class="navbar-nav ml-auto">
                    <button class="btn btn-outline-light btn-sm" onclick="window.location.href = '/'">
                        ← Назад на главную
                    </button>
                </div>
            </div>
        </nav>

        <div class="container mt-4">
            <!-- Меню -->
            <div class="menu-icon" id="menuButton">
                <div class="menu-line"></div>
                <div class="menu-line"></div>
                <div class="menu-line"></div>
            </div>
            <div class="sidebar" id="sidebar">
                {% if not user_id %}
                <a href="/login" class="menu-item">
                    Войти
                </a>
                {% else %}
                <a href="/profile" class="menu-item">
                    Профиль
                </a>
                {% endif %}
                <a href="/parks" class="menu-item">Парки</a>
                {% if user_id %}
                <a href="/logout" class="menu-item">Выйти</a>
                {% endif %}
            </div>
            
            <div class="row">
                <div class="col-12 text-center mb-5">
                    <h1 style="color: #2d5016;">Парки Москвы</h1>
                    <p class="lead">Откройте для себя зеленые уголки столицы</p>
                </div>
            </div>

            <!-- Поиск и фильтры -->
            <div class="row mb-4">
                <div class="col-12">
                    <div class="search-section">
                        <input type="text" id="parkSearch" class="form-control" placeholder="🔍 Поиск парков..." 
                               style="border-radius: 25px; padding: 12px 20px; border: 2px solid #8bc34a;">
                    </div>
                </div>
            </div>

            <!-- Сетка парков -->
            <div class="row" id="parksGrid">
                {% for park in parks %}
                <div class="col-lg-4 col-md-6 mb-4">
                <div class="park-card fade-in" onclick="window.location.href = '/park/{{ park.id }}'">
                    <div class="park-image" style="background-image: url('{{ park.image_src }}');">
                    </div>
                    <div class="park-info">
                        <h5>{{ park.name }}</h5>
                        <p class="park-location">{{ park.location }}</p>
                        <div class="park-stats">
                            <span>⭐ {{ park.rating }}</span>
                            <span>🕒 {{ park.hours }}</span>
                        </div>
                    </div>
                </div>
            </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-fQybjgWLrvvRgtW6bFlB7jaZrFsaBXjsOMm/tB9LTS58ONXgqbR9W8oWht/amnpF" crossorigin="anonymous"></script>
    <!-- <script src="/static/script.js"></script> -->
    <!-- <script src="/static/ar.js"></script> -->
</body>
</html>
